<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    text { font-family: system-ui, sans-serif; fill: #1a1a1a; }
    .th  { font-size: 14px; font-weight: 600; }
    .ts  { font-size: 12px; font-weight: 400; fill: #555; }
    .teal-fill   { fill: #E1F5EE; stroke: #0F6E56; }
    .purple-fill { fill: #EEEDFE; stroke: #534AB7; }
    .blue-fill   { fill: #E6F1FB; stroke: #185FA5; }
    .gray-fill   { fill: #F1EFE8; stroke: #5F5E5A; }
    .di-arrow    { stroke: #534AB7; stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .main-arrow  { stroke: #1a1a1a; stroke-width: 1.2; fill: none; }
    .dim-arrow   { stroke: #888; stroke-width: 0.8; stroke-dasharray: 4 3; fill: none; }
    .label       { font-size: 11px; fill: #666; font-family: system-ui, sans-serif; }
  </style>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-di" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-dim" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Adapters -->
<rect x="40" y="24" width="600" height="52" rx="10" stroke-width="0.5" class="teal-fill"/>
<text class="th" x="340" y="46" text-anchor="middle" dominant-baseline="central">Framework adapters</text>
<text class="ts" x="340" y="64" text-anchor="middle" dominant-baseline="central">FastAPI · Flask · Django · ASGI · Litestar · Starlette · DRF</text>

<line x1="340" y1="76" x2="340" y2="100" class="main-arrow" marker-end="url(#arr)"/>

<!-- Guard container -->
<rect x="160" y="102" width="360" height="130" rx="12" stroke-width="0.5" class="purple-fill"/>
<text class="th" x="340" y="124" text-anchor="middle" dominant-baseline="central">Guard</text>

<rect x="178" y="140" width="150" height="40" rx="6" stroke-width="0.5" class="blue-fill"/>
<text class="th" x="253" y="156" text-anchor="middle" dominant-baseline="central">Policy engine</text>
<text class="ts" x="253" y="172" text-anchor="middle" dominant-baseline="central">evaluate() · compile()</text>

<rect x="344" y="140" width="158" height="40" rx="6" stroke-width="0.5" class="blue-fill"/>
<text class="th" x="423" y="156" text-anchor="middle" dominant-baseline="central">PolicySet engine</text>
<text class="ts" x="423" y="172" text-anchor="middle" dominant-baseline="central">decide() · combining algos</text>

<rect x="178" y="192" width="324" height="28" rx="6" stroke-width="0.5" class="gray-fill"/>
<text class="ts" x="340" y="209" text-anchor="middle" dominant-baseline="central">Decision cache · Condition DSL · ReBAC checker</text>

<!-- DI: Roles -->
<line x1="160" y1="155" x2="122" y2="155" class="di-arrow" marker-end="url(#arr-di)"/>
<rect x="40" y="138" width="80" height="36" rx="6" stroke-width="0.5" class="purple-fill"/>
<text class="th" x="80" y="152" text-anchor="middle" dominant-baseline="central">Roles</text>
<text class="ts" x="80" y="168" text-anchor="middle" dominant-baseline="central">resolver</text>

<!-- DI: Obligations -->
<line x1="160" y1="195" x2="122" y2="195" class="di-arrow" marker-end="url(#arr-di)"/>
<rect x="40" y="178" width="80" height="36" rx="6" stroke-width="0.5" class="purple-fill"/>
<text class="th" x="80" y="192" text-anchor="middle" dominant-baseline="central">Obligations</text>
<text class="ts" x="80" y="208" text-anchor="middle" dominant-baseline="central">checker</text>

<!-- DI: Metrics -->
<line x1="520" y1="155" x2="558" y2="155" class="di-arrow" marker-end="url(#arr-di)"/>
<rect x="560" y="138" width="80" height="36" rx="6" stroke-width="0.5" class="purple-fill"/>
<text class="th" x="600" y="152" text-anchor="middle" dominant-baseline="central">Metrics</text>
<text class="ts" x="600" y="168" text-anchor="middle" dominant-baseline="central">sink</text>

<!-- DI: Log sink -->
<line x1="520" y1="195" x2="558" y2="195" class="di-arrow" marker-end="url(#arr-di)"/>
<rect x="560" y="178" width="80" height="36" rx="6" stroke-width="0.5" class="purple-fill"/>
<text class="th" x="600" y="192" text-anchor="middle" dominant-baseline="central">Log sink</text>
<text class="ts" x="600" y="208" text-anchor="middle" dominant-baseline="central">audit logger</text>

<!-- HotReloader -> Guard -->
<line x1="340" y1="360" x2="340" y2="234" class="main-arrow" marker-end="url(#arr)"/>
<text class="label" x="348" y="300">set_policy()</text>

<!-- HotReloader -->
<rect x="160" y="362" width="360" height="50" rx="10" stroke-width="0.5" class="teal-fill"/>
<text class="th" x="340" y="382" text-anchor="middle" dominant-baseline="central">HotReloader</text>
<text class="ts" x="340" y="400" text-anchor="middle" dominant-baseline="central">polls ETag · source.load() · guard.set_policy()</text>

<!-- Policy stores -> HotReloader -->
<line x1="340" y1="450" x2="340" y2="412" class="main-arrow" marker-end="url(#arr)"/>
<text class="label" x="348" y="433">etag() · load()</text>

<!-- Policy stores -->
<rect x="160" y="452" width="360" height="48" rx="10" stroke-width="0.5" class="gray-fill"/>
<text class="th" x="340" y="470" text-anchor="middle" dominant-baseline="central">Policy stores (PolicySource)</text>
<text class="ts" x="340" y="488" text-anchor="middle" dominant-baseline="central">FilePolicySource · HTTPPolicySource · S3PolicySource</text>

<!-- CLI -->
<rect x="40" y="502" width="100" height="40" rx="8" stroke-width="0.5" class="gray-fill"/>
<text class="th" x="90" y="518" text-anchor="middle" dominant-baseline="central">CLI</text>
<text class="ts" x="90" y="534" text-anchor="middle" dominant-baseline="central">lint · validate</text>

<!-- CLI -> Policy stores -->
<line x1="140" y1="522" x2="159" y2="492" class="dim-arrow" marker-end="url(#arr-dim)"/>

</svg>
